<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        .routing-sidebar {
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .routing-sidebar h3 {
            margin-top: 0;
            color: #333;
        }
        .waypoint-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .waypoint-controls button {
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            color: black;
        }
        .waypoint-controls button:hover {
            background: #e0e0e0;
        }
        .waypoint-controls button.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        .waypoint-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            margin: 2px 0;
            background: #f9f9f9;
            border-radius: 3px;
            cursor: grab;
            user-select: none;
            border: 1px solid #ddd;
        }
        .waypoint-item:hover {
            background: #e9e9e9;
        }
        .waypoint-item.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }
        .waypoint-item.drag-over {
            border: 2px solid #007bff;
            background: #e7f3ff;
        }
        .waypoint-item button {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            padding: 2px 5px;
            font-size: 12px;
        }
        .waypoint-item button:hover {
            background: #cc0000;
        }
        #waypointList {
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
        }
        #routeInfo {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        #routeInfo h4 {
            margin: 0 0 10px 0;
            color: #333;
        }
        #routeInfo p {
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="routing-sidebar">
        <h3>Routing</h3>
        <div class="waypoint-controls">
            <button id="setStartBtn">Set Start</button>
            <button id="setEndBtn">Set End</button>
            <button id="addWaypointBtn">Add Waypoint</button>
            <button id="clearAllBtn">Clear All</button>
        </div>
        <input type="text" id="startInput" placeholder="Start location">
        <input type="text" id="endInput" placeholder="End location">
        <select id="transportMode">
            <option value="foot">Walk</option>
            <option value="bike">Bike</option>
            <option value="car">Car</option>
            <option value="bus">Bus</option>
        </select>
        <div id="waypointList"></div>
        <button id="routeBtn">Get Route</button>
        <div id="routeInfo"></div>
    </div>

    <script src="routing.js"></script>
</body>
</html>
