<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #attribution {
            position: absolute;
            bottom: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            text-align: right;
        }
        .container {
            display: flex;
            height: 100%;
        }
        .sidebar {
            width: 300px;
            background: #f4f4f4;
            padding: 20px;
            overflow-y: auto;
        }
        .main {
            flex: 1;
            position: relative;
        }
        #results {
            list-style: none;
            padding: 0;
        }
        #results li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }
        #results li:hover {
            background: #e0e0e0;
        }
        .sidebar.hidden {
            display: none;
        }
        .main.expanded {
            flex: 1;
        }
        .search-element.hidden {
            display: none;
        }
        .draw-sidebar .waypoint-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .draw-sidebar .waypoint-controls button {
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .waypoint-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            margin: 2px 0;
            background: #f0f0f0;
            border-radius: 3px;
            cursor: grab;
            user-select: none;
        }
        .waypoint-item:hover {
            background: #e0e0e0;
        }
        .waypoint-item.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }
        .waypoint-item.drag-over {
            border: 2px solid #007bff;
            background: #e7f3ff;
        }
        .waypoint-item button {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            padding: 2px 5px;
            font-size: 12px;
        }
        .ol-d-button button {
            height: 26px;
            width: 26px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar search-sidebar hidden">
            <iframe id="searchFrame" src="search.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="sidebar routing-sidebar hidden">
            <iframe id="routingFrame" src="routing.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="sidebar draw-sidebar hidden">
            <iframe id="drawFrame" src="draw.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="main expanded">
            <div id="map"></div>
            <div id="attribution"></div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
    <script src="index.js"></script>
</body>
</html>
