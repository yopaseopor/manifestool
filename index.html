<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
	<title>Manifestool</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #attribution {
            position: absolute;
            bottom: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            text-align: right;
        }
        .container {
            display: flex;
            height: 100%;
        }
        .sidebar {
            width: 300px;
            background: #f4f4f4;
            padding: 20px;
            overflow-y: auto;
        }
        .main {
            flex: 1;
            position: relative;
        }
        #results {
            list-style: none;
            padding: 0;
        }
        #results li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }
        #results li:hover {
            background: #e0e0e0;
        }
        .sidebar.hidden {
            display: none;
        }
        .main.expanded {
            flex: 1;
        }
        .search-element.hidden {
            display: none;
        }
        .draw-sidebar .waypoint-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .draw-sidebar .waypoint-controls button {
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .waypoint-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            margin: 2px 0;
            background: #f0f0f0;
            border-radius: 3px;
            cursor: grab;
            user-select: none;
        }
        .waypoint-item:hover {
            background: #e0e0e0;
        }
        .waypoint-item.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }
        .waypoint-item.drag-over {
            border: 2px solid #007bff;
            background: #e7f3ff;
        }
        .waypoint-item button {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            padding: 2px 5px;
            font-size: 12px;
        }
        .ol-d-button button {
            height: 26px;
            width: 26px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .ol-share-button button {
            height: 26px;
            width: 26px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
/* General OpenLayers control buttons */
.ol-control button,
.ol-control select {
    font-size: 1.2em; /* Increase font size */
    padding: 8px 12px; /* Increase padding */
    margin: 5px; /* Add margin for separation */
    min-width: 40px; /* Ensure a minimum width */
    height: 40px; /* Ensure a consistent height */
    box-sizing: border-box; /* Include padding and border in element's total width and height */
    line-height: 1; /* Adjust line height */
    display: flex; /* Use flexbox for centering content */
    align-items: center; /* Center content vertically */
    justify-content: center; /* Center content horizontally */
}

/* Specific adjustments for zoom buttons (OpenLayers default classes) */
.ol-zoom-in,
.ol-zoom-out {
    font-size: 1.8em; /* Make zoom icons larger */
    font-weight: bold;
    width: 45px; /* Larger circular buttons */
    height: 45px;
    border-radius: 50%; /* Make them circular */
}

/* Adjust position for better mobile access (example, might need fine-tuning) */
.ol-zoom {
    top: 0.5em;
    left: 0.5em;
}
.ol-rotate {
    top: 0.5em;
    right: 0.5em;
}

/* Styles for the specific icon buttons (search, routing, drawing, share) */
.ol-search button,
.ol-r-button button,
.ol-d-button button,
.ol-share-button button {
    font-size: 1.8em; /* Bigger icons */
    width: 45px;
    height: 45px;
    border-radius: 50%; /* Circular buttons */
}

/* Adjust positioning of custom controls if they are stacking */
/* This assumes custom controls are added sequentially and might need custom wrappers in HTML */
.ol-control.ol-layer {
    top: 5.5em; /* Position below zoom controls */
    left: 0.5em;
}
.ol-control.ol-search {
    top: 10.5em; /* Position below layer selector */
    left: 0.5em;
}
.ol-control.ol-r-button {
    top: 15.5em; /* Position below search */
    left: 0.5em;
}
.ol-control.ol-d-button {
    top: 20.5em; /* Position below routing */
    left: 0.5em;
}
.ol-control.ol-share-button {
    top: 25.5em; /* Position below drawing */
    left: 0.5em;
}

@media screen and (max-width: 768px) {
    .container {
        flex-direction: row; /* Keep horizontal for 50/50 */
    }

    .sidebar {
        width: 50%; /* Each sidebar takes 50% width when active */
        padding: 10px; /* Adjust padding for mobile */
        /* Ensure it's not hidden by default if meant to be visible */
        /* The 'hidden' class should still work to hide inactive sidebars */
    }

    .main {
        width: 50%; /* Map takes 50% width when a sidebar is active */
        flex: none; /* Override flex: 1 behavior for 50% width */
    }

    /* Override .main.expanded for mobile view when a sidebar is active */
    .sidebar:not(.hidden) + .main.expanded {
        width: 50%;
        flex: none;
    }
    
    /* When no sidebar is active, main should be 100% */
    .sidebar.hidden + .main {
        width: 100%;
        flex: none; /* Ensure flex property is overridden if set elsewhere */
    }

    /* Adjust the general positioning of ol-controls for smaller screens if needed */
    .ol-control.ol-layer,
    .ol-control.ol-search,
    .ol-control.ol-r-button,
    .ol-control.ol-d-button,
    .ol-control.ol-share-button {
        top: auto; /* Remove fixed top positioning */
        left: auto; /* Remove fixed left positioning */
        right: 0.5em; /* Position on the right for better thumb access */
        margin-bottom: 0.5em; /* Stack vertically from bottom */
    }

    /* Stack custom controls vertically from bottom on the right side */
    .ol-control.ol-share-button { bottom: 0.5em; }
    .ol-control.ol-d-button    { bottom: 5.5em; }
    .ol-control.ol-r-button    { bottom: 10.5em; }
    .ol-control.ol-search     { bottom: 15.5em; }
    .ol-control.ol-layer      { bottom: 20.5em; }
    .ol-zoom {
        top: 0.5em;
        left: 0.5em; /* Keep zoom controls on top-left */
    }
    .ol-rotate {
        top: 0.5em;
        right: 0.5em; /* Keep rotate on top-right */
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar search-sidebar hidden">
            <iframe id="searchFrame" src="search.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="sidebar routing-sidebar hidden">
            <iframe id="routingFrame" src="routing.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="sidebar draw-sidebar hidden">
            <iframe id="drawFrame" src="draw.html" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="main expanded">
            <div id="map"></div>
            <div id="attribution"></div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>
    <script src="index.js"></script>
</body>
</html>
